<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>النظم السياسية | منصة اختبارات</title>
  
  <!-- Google Analytics Tracking Code -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3GQ6QRPXM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z3GQ6QRPXM');
  </script>

  <style>
    /* التنسيقات (نفس التنسيقات السابقة لضمان استقرار المظهر) */
    :root {
      --bg: #e8ddcf; --container-bg: #fdf9f3; --text: #1f1a14; --text-secondary: #5c4a37;
      --border: #d4c5b2; --card-bg: #ffffff; --card-border: #ccbbaa; --option-bg: #f5efe6;
      --option-border: #d6c6b4; --option-hover-bg: #e9d9c8; --option-hover-border: #a89070;
      --correct-bg: #c8e6c9; --correct-border: #388e3c; --wrong-bg: #f1cfcf; --wrong-border: #c62828;
      --badge-bg: #9b7b5c; --badge-text: #fef7f0; --btn-bg: #d6c4ae; --btn-text: #2b2016;
      --btn-border: #b0977c; --btn-shadow: #8b6f55; --finish-btn-bg: #7d6046; --finish-btn-text: #fef7f0;
      --counter-bg: #e2d2be; --timer-bg: #cfbb9f; --score-badge-bg: #d4c0a6; --qnum-bg: #a3886d;
      --qnum-text: #fef7f0; --header-color: #3e2c1c; --toggle-bg: #d4c0a6; --toggle-text: #3e2c1c;
      --result-bg: #e7d7c0; --result-text: #3e2c1c; --result-border: #b3946e; --restart-bg: #9b7b5c;
      --footer-color: #5c4a37; --brand-gradient: linear-gradient(135deg, #7d6046, #3e2c1c);
      --brand-text: #fdf9f3; --section-card-bg: #f5efe6; --section-card-border: #d6c6b4;
      --section-card-hover: #e9d9c8; --feedback-correct-bg: #ecf3e8; --feedback-correct-border: #4f7a5c;
      --feedback-wrong-bg: #f9efed; --feedback-wrong-border: #b57070; --analysis-bg: #f3ede5;
      --analysis-border: #7a6852;
    }
    body.dark {
      --bg: #12161f; --container-bg: #1b1f2a; --text: #d4d8e0; --text-secondary: #9aa0b0;
      --border: #2d3340; --card-bg: #212531; --card-border: #333b4a; --option-bg: #1a1f2b;
      --option-border: #3a4252; --option-hover-bg: #262d3a; --option-hover-border: #d4a94e;
      --correct-bg: #1e3b2a; --correct-border: #4caf50; --wrong-bg: #3d2020; --wrong-border: #ef5350;
      --badge-bg: #d4a94e33; --badge-text: #d4a94e; --btn-bg: #333b4a; --btn-text: #d4d8e0;
      --btn-border: #4a5568; --btn-shadow: #161a22; --finish-btn-bg: #d4a94e; --finish-btn-text: #12161f;
      --counter-bg: #212531; --timer-bg: #212531; --score-badge-bg: #212531; --qnum-bg: #d4a94e;
      --qnum-text: #12161f; --header-color: #e8cc8a; --toggle-bg: #333b4a; --toggle-text: #d4d8e0;
      --result-bg: #212531; --result-text: #d4a94e; --result-border: #d4a94e; --restart-bg: #d4a94e;
      --footer-color: #6b7280; --brand-gradient: linear-gradient(135deg, #d4a94e, #e8cc8a);
      --brand-text: #12161f; --section-card-bg: #1e2532; --section-card-border: #3a4252;
      --section-card-hover: #262d3a; --feedback-correct-bg: #1e3b2a; --feedback-correct-border: #4caf50;
      --feedback-wrong-bg: #3d2020; --feedback-wrong-border: #ef5350; --analysis-bg: #212531;
      --analysis-border: #d4a94e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; direction: rtl; color: var(--text); }
    .platform-wrapper { width: 100%; max-width: 960px; background: var(--container-bg); border-radius: 40px; box-shadow: 0 18px 40px -8px rgba(0,0,0,0.1); border: 1px solid var(--border); overflow: hidden; }
    .brand-bar { background: var(--brand-gradient); text-align: center; padding: 14px; }
    .brand-name { font-size: 1.8rem; font-weight: 700; color: var(--brand-text); letter-spacing: 2px; }
    .content-inner { padding: 24px; }
    .top-actions { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    .toggle-theme-btn { background: var(--toggle-bg); border: 1px solid var(--btn-border); color: var(--toggle-text); font-size: 1.2rem; padding: 8px; border-radius: 50%; cursor: pointer; }
    h1 { font-size: 1.8rem; text-align: center; color: var(--header-color); }
    .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; border-bottom: 1px dashed var(--border); padding-bottom: 16px; }
    .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin: 20px 0; }
    .section-card { background: var(--section-card-bg); border: 1.5px solid var(--section-card-border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; transition: 0.2s; }
    .section-card:hover { transform: translateY(-3px); border-color: var(--option-hover-border); }
    .card-icon { font-size: 2.5rem; }
    .card-title { font-weight: 700; font-size: 1.2rem; margin: 8px 0; }
    .card-count { font-size: 0.85rem; color: var(--badge-text); background: var(--badge-bg); padding: 4px 12px; border-radius: 20px; }
    #quizSection, #resultSection { display: none; }
    .progress-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .q-counter, .timer-display, .badge-score { background: var(--counter-bg); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--btn-border); font-weight: 600; }
    .question-card { background: var(--card-bg); border-radius: 28px; padding: 24px; border: 1px solid var(--card-border); }
    .q-header { display: flex; gap: 14px; margin-bottom: 20px; align-items: baseline; }
    .q-num { background: var(--qnum-bg); color: var(--qnum-text); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 800; flex-shrink: 0; }
    .q-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; }
    .option-row { display: flex; align-items: center; margin-bottom: 10px; background: var(--option-bg); border: 1.5px solid var(--option-border); border-radius: 60px; padding: 12px 18px; cursor: pointer; transition: 0.2s; }
    .option-row:hover:not(.disabled-opt) { background: var(--option-hover-bg); }
    .option-row.correct-highlight { background: var(--correct-bg); border-color: var(--correct-border); }
    .option-row.wrong-highlight { background: var(--wrong-bg); border-color: var(--wrong-border); }
    .option-row input { margin-left: 12px; width: 18px; height: 18px; }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
    .nav-btn { background: var(--btn-bg); color: var(--btn-text); padding: 12px 24px; border-radius: 50px; cursor: pointer; border: 1px solid var(--btn-border); font-weight: 600; font-family: 'Cairo'; }
    .finish-btn { background: var(--finish-btn-bg); color: var(--finish-btn-text); }
    .result-screen { text-align: center; }
    .final-score { font-size: 2.5rem; font-weight: 800; background: var(--result-bg); padding: 16px 40px; border-radius: 80px; color: var(--result-text); border: 2px solid var(--result-border); margin: 20px 0; display: inline-block; }
    .footer-note { text-align: center; margin-top: 24px; font-size: 0.85rem; border-top: 1px dashed var(--border); padding-top: 12px; color: var(--footer-color); }
    .home-link-icon { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; background: var(--badge-bg); padding: 6px 16px; border-radius: 30px; color: var(--badge-text); font-weight: bold; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="platform-wrapper">
  <div class="brand-bar"><span class="brand-name">Madar</span></div>
  <div class="content-inner">
    <div class="top-actions"><button class="toggle-theme-btn" id="toggleThemeBtn">🌓</button></div>
    
    <!-- Home Section -->
    <div id="homeSection">
      <h1>🏛️ النظم السياسية</h1>
      <div class="subtitle">الباب الأول · اختر المبحث للبدء</div>
      <div class="section-grid">
        <div class="section-card" data-section="1">
          <div class="card-icon">🌍</div><div class="card-title">المبحث الأول</div>
          <div class="card-count">33 سؤالاً</div>
        </div>
        <div class="section-card" data-section="2">
          <div class="card-icon">⚖️</div><div class="card-title">المبحث الثاني</div>
          <div class="card-count">32 سؤالاً</div>
        </div>
        <div class="section-card" data-section="3">
          <div class="card-icon">🏴</div><div class="card-title">المبحث الثالث</div>
          <div class="card-count">27 سؤالاً</div>
        </div>
      </div>
    </div>

    <!-- Quiz Section -->
    <div id="quizSection">
      <div class="progress-area">
        <span class="q-counter" id="questionCounter">السؤال 1 / --</span>
        <span class="timer-display" id="timerDisplay">⏱️ 00:00</span>
        <span class="badge-score" id="miniScore">📊 النتيجة</span>
      </div>
      <div class="question-card">
        <div class="q-header"><span class="q-num" id="qNumDisplay">1</span><span class="q-text" id="qTextDisplay"></span></div>
        <div id="mcOptions"></div>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">← السابق</button>
        <button class="nav-btn" id="nextBtn">التالي →</button>
        <button class="nav-btn finish-btn" id="finishBtn" style="display:none;">📋 إنهاء</button>
      </div>
    </div>

    <!-- Result Section -->
    <div id="resultSection">
      <div class="result-screen">
        <h2>📊 ملخص النتيجة</h2>
        <div class="final-score" id="finalScoreDisplay">0 / 0</div>
        <div id="percentageDisplay" style="font-weight:bold; font-size:1.2rem;"></div>
        <div style="margin-top:20px;">
          <button class="nav-btn" onclick="location.reload()">🔄 إعادة</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-note">
      <div class="home-link-icon" id="mainPageLinkBtn">
        🏠 العودة للواجهة الرئيسية (MADAR)
      </div>
      <p style="margin-top:10px;">تواصل عبر تيليجرام: <a href="https://t.me/GIX37" style="color:inherit;">@GIX37</a></p>
    </div>
  </div>
</div>

<script>
// بيانات الأسئلة (مختصرة للمثال)
const sectionsData = {
  "1": { name: "المبحث الأول", questions: [ {text: "يهتم علم النظم السياسية بـ:", options: ["صياغة النصوص","فلسفة الحكم","تفسير القواعد"], correct: 1} ] },
  "2": { name: "المبحث الثاني", questions: [ {text: "تكتسب الدولة الشخصية القانونية بـ:", options: ["الدستور","اكتمال الأركان","الاعتراف"], correct: 1} ] },
  "3": { name: "المبحث الثالث", questions: [ {text: "الاتحاد الفيدرالي ينشأ بـ:", options: ["معاهدة","دستور","قرار إداري"], correct: 1} ] }
};

let currentQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let timerSeconds = 0;
let timerInterval;

// تشغيل الاختبار
function startQuiz(id) {
  currentQuestions = sectionsData[id].questions;
  currentIndex = 0;
  userAnswers = new Array(currentQuestions.length).fill(null);
  document.getElementById('homeSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
  startTimer();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('qTextDisplay').textContent = q.text;
  document.getElementById('questionCounter').textContent = `السؤال ${currentIndex+1} / ${currentQuestions.length}`;
  let html = '';
  q.options.forEach((opt, i) => {
    html += `<div class="option-row" onclick="selectOption(${i})">${opt}</div>`;
  });
  document.getElementById('mcOptions').innerHTML = html;
  updateButtons();
}

function selectOption(i) {
  userAnswers[currentIndex] = i;
  if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderQuestion(); }
  else { updateButtons(); }
}

function updateButtons() {
  document.getElementById('nextBtn').style.display = (currentIndex < currentQuestions.length - 1) ? 'block' : 'none';
  document.getElementById('finishBtn').style.display = (currentIndex === currentQuestions.length - 1) ? 'block' : 'none';
}

function startTimer() {
  timerInterval = setInterval(() => { timerSeconds++; document.getElementById('timerDisplay').textContent = `⏱️ ${Math.floor(timerSeconds/60)}:${timerSeconds%60}`; }, 1000);
}

// الرابط المصلح للواجهة الرئيسية
document.getElementById('mainPageLinkBtn').addEventListener('click', () => {
  window.location.href = "https://COFFEE595.github.io/MADAR/index.html";
});

// تفعيل كروت المباحث
document.querySelectorAll('.section-card').forEach(card => {
  card.addEventListener('click', () => startQuiz(card.dataset.section));
});

// تبديل الوضع الليلي
document.getElementById('toggleThemeBtn').addEventListener('click', () => document.body.classList.toggle('dark'));

document.getElementById('finishBtn').addEventListener('click', () => {
  clearInterval(timerInterval);
  let correct = userAnswers.reduce((acc, ans, i) => acc + (ans === currentQuestions[i].correct ? 1 : 0), 0);
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('finalScoreDisplay').textContent = `${correct} / ${currentQuestions.length}`;
});
</script>
</body>
</html>
